<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KROW - Iniciar Sesión</title>
  <link rel="stylesheet" href="../public/css/styles.css">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
 
    .login-card {
      background-color: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 440px;
    }
 
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
 
    .login-logo {
      color: var(--accent);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }
 
    .login-subtitle {
      color: var(--muted);
      font-size: 0.875rem;
    }
 
    .form-group {
      margin-bottom: 1rem;
    }
 
    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.375rem;
    }
 
    .input-group {
      display: flex;
      align-items: stretch;
    }
 
    .input-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 0.75rem;
      background-color: var(--bg);
      border: 0.5px solid var(--border);
      border-right: none;
      border-radius: var(--radius) 0 0 var(--radius);
      color: var(--muted);
      font-size: 1rem;
    }
 
    .input-group input {
      border-radius: 0 var(--radius) var(--radius) 0;
    }
 
    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.375rem;
    }
 
    .label-row label {
      margin-bottom: 0;
    }
 
    .link-forgot {
      font-size: 0.8rem;
      color: var(--accent);
    }
 
    .link-forgot:hover {
      opacity: 0.8;
    }
 
    .check-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
 
    .check-row input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--primary);
      flex-shrink: 0;
    }
 
    .check-row label {
      font-size: 0.875rem;
      color: var(--muted);
      font-weight: 400;
    }
 
    .btn-login {
      width: 100%;
      padding: 0.65rem;
      background-color: var(--primary);
      color: var(--bg);
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.15s;
      margin-bottom: 1rem;
    }
 
    .btn-login:hover {
      opacity: 0.85;
    }
 
    .register-section {
      text-align: center;
    }
 
    .register-section p {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
 
    .register-btns {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
    }
 
    .btn-register {
      padding: 0.45rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 500;
      border: 0.5px solid var(--border);
      background-color: transparent;
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
 
    .btn-register:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
 
  <div class="login-wrap">
    <div class="login-card">
      <button id="themeToggle" class="theme-toggle" aria-label="Cambiar tema" title="Cambiar tema">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/></svg>
      </button>
 
      <div class="login-header">
        <div class="login-logo">KROW</div>
        <p class="login-subtitle">Banco de Trabajo Universitario</p>
      </div>
 
      <form action="#" method="POST">
 
        <div class="form-group">
          <label for="usuario">Correo Institucional o CUIT</label>
          <div class="input-group">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            </span>
            <input type="text" id="usuario" name="usuario" placeholder="ejemplo@alumnos.frh.utn.edu.ar o 30-12345678-9" required>
          </div>
        </div>
 
        <div class="form-group">
          <div class="label-row">
            <label for="password">Contraseña</label>
            <a href="#" class="link-forgot">¿Olvidaste tu clave?</a>
          </div>
          <div class="input-group">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
          </div>
        </div>
 
        <div class="check-row">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">Recordar mi sesión</label>
        </div>
 
        <button type="submit" class="btn-login">INGRESAR</button>
 
      </form>
 
      <hr>
 
      <div class="register-section">
        <p>¿No tenés una cuenta todavía?</p>
        <div class="register-btns">
          <a href="registro-estudiante.php" class="btn-register">Soy Estudiante</a>
          <a href="registro-empresa.php" class="btn-register">Soy Empresa</a>
        </div>
      </div>
 
    </div>
  </div>
 
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../public/css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>KROW - Filtros</title>
</head>
<body>
<h3>Filtros</h3>
<form action="" method="GET" class="filters-form">
    
    <div class="filter-group text-search-group">
        <label for="buscar">Buscar</label>
        <div class="search-input-wrapper">
            <i class="bi bi-search search-icon"></i>
            <input type="text" id="buscar" name="buscar" placeholder="Buscar trabajo, empresa..." class="filter-input-text">
        </div>
    </div>

    <div class="filter-group">
        <label for="provincia">Provincia</label>
        <div class="select-wrapper">
            <select id="provincia" name="provincia" class="filter-select">
                <option value="" disabled selected>Seleccioná una provincia</option>
                <option value="Buenos Aires">Buenos Aires</option>
                <option value="CABA">CABA</option>
                <option value="Córdoba">Córdoba</option>
                <option value="Santa Fe">Santa Fe</option>
                <option value="Mendoza">Mendoza</option>
            </select>
            <i class="bi bi-chevron-down select-chevron"></i>
        </div>
    </div>

    <div class="filter-group">
        <label for="localidad">Localidad</label>
        <div class="select-wrapper">
            <select id="localidad" name="localidad" class="filter-select" disabled>
                <option value="" disabled selected>Seleccioná primero una provincia</option>
            </select>
            <i class="bi bi-chevron-down select-chevron"></i>
        </div>
    </div>

    <div class="filter-group">
        <label for="categoria">Categoría</label>
        <div class="select-wrapper">
            <select id="categoria" name="categoria" class="filter-select">
                <option value="Ingenieria">Ingeniería</option>
                <option value="Tecnología">Tecnología</option>
                <option value="Industria y produccion">Industria y producción</option>
                <option value="Marketing">Marketing</option>
                <option value="Ventas">Ventas</option>
                <option value="Recursos Humanos">Recursos Humanos</option>
                <option value="Diseño">Diseño</option>
                <option value="Administración">Administración</option>
                <option value="Finanzas">Finanzas</option>
            </select>
            <i class="bi bi-chevron-down select-chevron"></i>
        </div>
    </div>

    <div class="filter-accordion open">
        <div class="accordion-header">
            <span>Tipo de contrato</span>
            <i class="bi bi-chevron-up accordion-chevron"></i>
        </div>
        <div class="accordion-content">
            <label class="filter-checkbox-label">
                <input type="checkbox" name="contrato[]" value="pasantia">
                <span class="custom-checkbox"></span> Pasantía
            </label>
            <label class="filter-checkbox-label">
                <input type="checkbox" name="contrato[]" value="part-time">
                <span class="custom-checkbox"></span> Part-time
            </label>
            <label class="filter-checkbox-label">
                <input type="checkbox" name="contrato[]" value="full-time">
                <span class="custom-checkbox"></span> Full-time
            </label>
            <label class="filter-checkbox-label">
                <input type="checkbox" name="contrato[]" value="practica profesional">
                <span class="custom-checkbox"></span> Pasantía profesional
            </label>
        </div>
    </div>

    <div class="filter-accordion open">
        <div class="accordion-header">
            <span>Modalidad</span>
            <i class="bi bi-chevron-up accordion-chevron"></i>
        </div>
        <div class="accordion-content">
            <label class="filter-checkbox-label">
                <input type="checkbox" name="modalidad[]" value="presencial">
                <span class="custom-checkbox"></span> Presencial
            </label>
            <label class="filter-checkbox-label">
                <input type="checkbox" name="modalidad[]" value="remoto">
                <span class="custom-checkbox"></span> Remoto
            </label>
            <label class="filter-checkbox-label">
                <input type="checkbox" name="modalidad[]" value="mixto">
                <span class="custom-checkbox"></span> Mixto
            </label>
        </div>
    </div>

    <div class="filter-accordion open">
        <div class="accordion-header">
            <span>Carreras UTN FRH</span>
            <i class="bi bi-chevron-up accordion-chevron"></i>
        </div>
        <div class="accordion-content">
            <label class="filter-checkbox-label">
                <input type="checkbox" name="carrera[]" value="aeronautica-aeroespacial">
                <span class="custom-checkbox"></span> Ingeniería Aeronáutica/Aeroespacial
            </label>
            <label class="filter-checkbox-label">
                <input type="checkbox" name="carrera[]" value="electronica">
                <span class="custom-checkbox"></span> Ingeniería Electrónica
            </label>
            <label class="filter-checkbox-label">
                <input type="checkbox" name="carrera[]" value="ferroviaria">
                <span class="custom-checkbox"></span> Ingeniería Ferroviaria
            </label>
            <label class="filter-checkbox-label">
                <input type="checkbox" name="carrera[]" value="industrial">
                <span class="custom-checkbox"></span> Ingeniería Industrial
            </label>
            <label class="filter-checkbox-label">
                <input type="checkbox" name="carrera[]" value="mecanica">
                <span class="custom-checkbox"></span> Ingeniería Mecánica
            </label>
            <label class="filter-checkbox-label">
                <input type="checkbox" name="carrera[]" value="bio">
                <span class="custom-checkbox"></span> Bioingeniería
            </label>
            <label class="filter-checkbox-label">
                <input type="checkbox" name="carrera[]" value="tec-tup">
                <span class="custom-checkbox"></span> Tecnicatura Universitaria en Programación
            </label>
            <label class="filter-checkbox-label">
                <input type="checkbox" name="carrera[]" value="tec-tuoa">
                <span class="custom-checkbox"></span> Tecnicatura Universitaria en Operación de Aeronaves
            </label>
            <label class="filter-checkbox-label">
                <input type="checkbox" name="carrera[]" value="tec-tumrf">
                <span class="custom-checkbox"></span> Tecnicatura Universitaria en Material Rodante Ferroviario
            </label>
            <label class="filter-checkbox-label">
                <input type="checkbox" name="carrera[]" value="tec-tudpv">
                <span class="custom-checkbox"></span> Tecnicatura Universitaria en Desarrollo y Producción de Videojuegos
            </label>
            <label class="filter-checkbox-label">
                <input type="checkbox" name="carrera[]" value="tec-tuhst">
                <span class="custom-checkbox"></span> Tecnicatura Universitaria en Higiene y Seguridad en el Trabajo
            </label>
            <label class="filter-checkbox-label">
                <input type="checkbox" name="carrera[]" value="tec-tucem">
                <span class="custom-checkbox"></span> Tecnicatura Universitaria en Comercio Electrónico y Marketing Digital
            </label>
            <label class="filter-checkbox-label">
                <input type="checkbox" name="carrera[]" value="tec-tul">
                <span class="custom-checkbox"></span> Tecnicatura Universitaria en Logística
            </label>
        </div>
    </div>

    <div class="filter-accordion open">
        <div class="accordion-header">
            <span>Tecnologías / Herramientas</span>
            <i class="bi bi-chevron-up accordion-chevron"></i>
        </div>
        <div class="accordion-content">
            <div class="tag-input-wrapper">
                <input type="text" id="tecnologia-input" placeholder="Ej: C#, Oracle, Git..." class="filter-input-text">
                <button type="button" id="btn-add-tag" class="btn-input-append">+</button>
            </div>
            <div id="tags-container" class="tags-flex-container"></div>
        </div>
    </div>

    <div class="filter-accordion">
        <div class="accordion-header">
            <span>Fecha de publicación</span>
            <i class="bi bi-chevron-down accordion-chevron"></i>
        </div>
        <div class="accordion-content">
            <label class="filter-checkbox-label">
                <input type="radio" name="fecha" value="hoy">
                <span class="custom-radio"></span> Hoy
            </label>
            <label class="filter-checkbox-label">
                <input type="radio" name="fecha" value="ultima-semana">
                <span class="custom-radio"></span> Última semana
            </label>
            <label class="filter-checkbox-label">
                <input type="radio" name="fecha" value="ultimo-mes">
                <span class="custom-radio"></span> Último mes
            </label>
            <label class="filter-checkbox-label">
                <input type="radio" name="fecha" value="total" checked>
                <span class="custom-radio"></span> Cualquier fecha
            </label>
        </div>
    </div>
</form>

<script src="../public/js/main.js"></script>
</body>
</html>
